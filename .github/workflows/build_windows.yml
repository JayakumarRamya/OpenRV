name: Build OpenRV Windows (VFX-CY2024)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Configuration'
        default: 'Release'
        type: choice
        options: [Release, Debug]

jobs:
  build:
    runs-on: windows-2022
    env:
      # Short path to avoid the 260-char limit (documented in OpenRV guide)
      BUILD_DIR: 'C:\rv'
      PYTHON_VERSION: '3.11'
      QT_VERSION: '6.5.3'

    steps:
      - name: Enable Long Paths
        run: git config --system core.longpaths true

      - name: Checkout OpenRV
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: 'temp_src'

      - name: Move Source to Root
        run: |
          mkdir ${{ env.BUILD_DIR }}
          Move-Item -Path "temp_src\*" -Destination ${{ env.BUILD_DIR }}
        shell: powershell

      # Replaces the broken bus1/setup-msvc action
      # Force MSVC v143 (14.40) as required by OpenRV documentation
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: '14.40' 

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create Python3 Alias
        run: |
          $pyPath = (Get-Command python).Source
          $pyDir = Split-Path $pyPath
          Copy-Item "$pyPath" "$pyDir\python3.exe"
        shell: powershell

      - name: Install System Dependencies
        run: |
          choco install strawberryperl nasm winflexbison pkgconfiglite cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          rustup toolchain install stable
          pip install pyyaml requests wheel pyzstd py7zr pre-commit numpy

      # Automated Qt installation for CI
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          arch: 'win64_msvc2019_64'
          dir: 'C:\'

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            autoconf automake bison flex git libtool nasm p7zip patch unzip zip
            mingw-w64-x86_64-toolchain mingw-w64-x86_64-meson mingw-w64-x86_64-libarchive

      - name: Bootstrap and Build
        shell: bash
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          # Configure environment variables as per OpenRV docs
          export PATH="/c/Program Files/CMake/bin:/c/msys64/mingw64/bin:$PATH"
          export ACLOCAL_PATH="/c/msys64/usr/share/aclocal"
          export QT_HOME="/c/Qt/6.5.3/msvc2019_64"
          
          # Initialize OpenRV environment
          source rvcmds.sh
          
          # Set build mode
          if [ "${{ github.event.inputs.build_type }}" == "Debug" ]; then
            rvdebug
          else
            rvrelease
          fi

          # First-time setup (Bootstrap)
          # Piping '3' to select the Windows build profile automatically
          echo "3" | ./rvbootstrap
          
          # Run the actual build
          rvmk -j $NUMBER_OF_PROCESSORS

      - name: Create Installation Package
        shell: bash
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          source rvcmds.sh
          rvinst

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-Windows-${{ github.event.inputs.build_type }}
          path: ${{ env.BUILD_DIR }}/_install
