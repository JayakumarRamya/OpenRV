
name: Build OpenRV Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    env:
      QT_VERSION: 5.15.2

    steps:

    - name: Enable long paths
      run: git config --system core.longpaths true

    - name: Checkout OpenRV
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      shell: powershell
      run: |
        choco install strawberryperl nasm winflexbison pkgconfiglite cmake -y
        python -m pip install --upgrade pip
        pip install pyyaml requests wheel numpy
        echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 5.15.2
        arch: win64_msvc2019_64
        modules: qtwebengine
        dir: C:\Qt

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          autoconf automake bison flex git libtool nasm p7zip patch unzip zip
          mingw-w64-x86_64-toolchain

    - name: Configure OpenRV
      shell: bash
      run: |

        export PATH="$PATH:/c/Program Files/CMake/bin:/c/ProgramData/chocolatey/bin:/c/msys64/mingw64/bin"
        export QT_HOME="/c/Qt/5.15.2/msvc2019_64"

        cmake -B build \
          -G "Visual Studio 17 2022" \
          -A x64 \
          -DCMAKE_PREFIX_PATH=$QT_HOME \
          -DRV_DEPS_QT_LOCATION=$QT_HOME \
          -DRV_DEPS_WIN_PERL_ROOT=/c/Strawberry/perl/bin \
          -DFLEX_EXECUTABLE=/c/ProgramData/chocolatey/bin/win_flex.exe \
          -DBISON_EXECUTABLE=/c/ProgramData/chocolatey/bin/win_bison.exe

    - name: Build
      shell: bash
      run: cmake --build build --config Release --parallel 4

    - name: Install
      shell: bash
      run: cmake --install build --prefix install

    - name: Upload OpenRV artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: install
