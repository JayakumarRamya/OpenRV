name: OpenRV Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - uses: lukka/get-cmake@latest

    - uses: jurplel/install-qt-action@v4
      with:
        version: "6.5.3"
        host: windows
        target: desktop
        arch: win64_msvc2019_64

    - name: Install MSYS2 tools
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          git
          flex
          bison
          nasm
          unzip
          zip
          patch
          autoconf
          automake
          libtool
          make
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-autotools
          mingw-w64-x86_64-libarchive
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-pkg-config

    - name: Build OpenRV
      shell: msys2 {0}
      run: |

        bash -il <<'EOF'

        export RV_VFX_PLATFORM=CY2024
        export RV_BUILD_PARALLELISM=8

        QT_MSYS=$(cygpath "$QT_ROOT_DIR")

        export QT_HOME="$QT_MSYS"
        export Qt6_DIR="$QT_MSYS/lib/cmake/Qt6"
        export CMAKE_PREFIX_PATH="$QT_MSYS"

        export PATH="/c/Program Files/CMake/bin:/c/msys64/mingw64/bin:$PATH"

        cd "$GITHUB_WORKSPACE"

        echo "Qt location:"
        echo "$QT_MSYS"

        ls "$QT_MSYS/lib/cmake/Qt6"

        git submodule update --init --recursive

        python3 -m pip install --upgrade pip

        source rvcmds.sh

        rvbootstrap

        rvmk

        EOF

    - uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: _build/stage/app
