name: OpenRV Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # The build scripts expect a 'python3' command.
    - name: Create python3.exe alias
      run: |
        $pythonPath = (Get-Command python).Source
        Copy-Item $pythonPath "$(Split-Path $pythonPath)\python3.exe"
      shell: powershell

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Install Strawberry Perl
      run: choco install strawberryperl -y

    - name: Install Rust
      shell: powershell
      run: |
        Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
        .\rustup-init.exe -y
        echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          git
          flex
          bison
          nasm
          unzip
          zip
          patch
          autoconf
          automake
          libtool
          make
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-autotools
          mingw-w64-x86_64-libarchive
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-pkg-config

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.5.3"
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        dir: C:/Qt

    # Main build step – runs inside the MSYS2 MINGW64 shell.
    - name: Build OpenRV
      shell: msys2 {0}
      run: |
        # Set environment variables for the build.
        export RV_VFX_PLATFORM=CY2024
        export RV_BUILD_PARALLELISM=2          # GitHub runner has 2 cores
        export QT_HOME=/c/Qt/6.5.3/msvc2019_64

        # The script forces an exact MSVC toolset version (14.40) by default.
        # Override it to use the latest v143 toolset available.
        export RV_TOOLCHAIN="-T v143"

        cd "$GITHUB_WORKSPACE"

        # Source the command aliases.
        source rvcmds.sh

        # Verify that python3 is available (it should be thanks to the alias we created).
        python3 --version

        # First-time setup: creates .venv, installs Python dependencies, and builds.
        rvbootstrap

        # (Optional) Reconfigure with non‑free FFmpeg codecs.
        # Adjust the list according to your needs.
        rvcfg \
          -DRV_FFMPEG_NON_FREE_DECODERS_TO_ENABLE="aac;h264;hevc;prores" \
          -DRV_FFMPEG_NON_FREE_ENCODERS_TO_ENABLE="aac"

        # Build again (the second build will be incremental).
        rvbuild

    - name: Upload OpenRV Build
      uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: _build/stage/app
