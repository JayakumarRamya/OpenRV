
name: Build OpenRV Windows (VFX-CY2024)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    env:
      QT_VERSION: 5.15.2
      PYTHON_VERSION: "3.11"

    steps:

    - name: Enable Windows long paths
      run: git config --system core.longpaths true

    - name: Checkout OpenRV
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    # Fix long TEMP paths (OpenTimelineIO issue)
    - name: Fix Windows temp path
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path C:\temp
        echo "TEMP=C:\temp" >> $env:GITHUB_ENV
        echo "TMP=C:\temp" >> $env:GITHUB_ENV

    # Disable PySide parallel jobs (fix --jobs error)
    - name: Disable PySide parallel build
      shell: powershell
      run: |
        echo "RV_DEPS_PYSIDE_PARALLEL=1" >> $env:GITHUB_ENV

    - name: Install build tools
      shell: powershell
      run: |
        choco install strawberryperl nasm winflexbison pkgconfiglite cmake -y
        python -m pip install --upgrade pip
        pip install pyyaml requests wheel numpy
        echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

    # Fix flex/bison naming
    - name: Create flex / bison wrappers
      shell: powershell
      run: |
        Copy-Item "C:\ProgramData\chocolatey\bin\win_flex.exe" `
                  "C:\ProgramData\chocolatey\bin\flex.exe" -Force
        Copy-Item "C:\ProgramData\chocolatey\bin\win_bison.exe" `
                  "C:\ProgramData\chocolatey\bin\bison.exe" -Force

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        arch: win64_msvc2019_64
        modules: qtwebengine
        dir: C:\Qt

    # OpenRV expects Qt without nested Qt folder
    - name: Fix Qt folder layout
      shell: powershell
      run: |
        if (!(Test-Path "C:\Qt\5.15.2")) {
          Copy-Item -Recurse "C:\Qt\Qt\5.15.2" "C:\Qt\5.15.2"
        }

        New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\translations
        New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\resources

    - name: Setup MSYS2 tools
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          autoconf automake bison flex git libtool nasm p7zip patch unzip zip
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-libarchive
          mingw-w64-x86_64-glew

    - name: Configure OpenRV
      shell: bash
      run: |

        export PATH="/c/ProgramData/chocolatey/bin:/c/msys64/mingw64/bin:/c/Program\ Files/CMake/bin:/c/Program\ Files/Git/usr/bin:$PATH"
        export QT_HOME="/c/Qt/5.15.2/msvc2019_64"

        cmake -B build \
          -G "Visual Studio 17 2022" \
          -A x64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
          -DCMAKE_PREFIX_PATH=$QT_HOME \
          -DRV_DEPS_QT_LOCATION=$QT_HOME \
          -DRV_DEPS_WIN_PERL_ROOT=/c/Strawberry/perl/bin

    - name: Build OpenRV
      shell: bash
      run: |
        cmake --build build --config Release --parallel 4

    - name: Install OpenRV
      shell: bash
      run: |
        cmake --install build --config Release --prefix install

    - name: Upload OpenRV artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: install
