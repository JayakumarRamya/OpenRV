name: Build OpenRV Windows (VFX-CY2024)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    env:
      QT_VERSION: 5.15.2
      PYTHON_VERSION: "3.10"
      # This silences the harmless Node.js 20 GitHub warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Enable Windows long paths
        run: git config --system core.longpaths true

      - name: Checkout OpenRV
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: openrv-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Fix Windows TEMP
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\temp
          echo "TEMP=C:\temp" >> $env:GITHUB_ENV
          echo "TMP=C:\temp" >> $env:GITHUB_ENV

      - name: Install build tools
        shell: powershell
        run: |
          choco install strawberryperl nasm pkgconfiglite jom llvm -y
          choco install winflexbison -y
          choco install cmake --version=3.27.9 -y

          python -m pip install --upgrade pip
          pip install pyyaml requests wheel numpy
          pip install meson ninja

      - name: Fix flex and bison
        shell: powershell
        run: |
          $bin="C:\ProgramData\chocolatey\bin"

          if (Test-Path "$bin\winflex.exe") { Copy-Item "$bin\winflex.exe" "$bin\flex.exe" -Force }
          if (Test-Path "$bin\win_flex.exe") { Copy-Item "$bin\win_flex.exe" "$bin\flex.exe" -Force }

          if (Test-Path "$bin\winbison.exe") { Copy-Item "$bin\winbison.exe" "$bin\bison.exe" -Force }
          if (Test-Path "$bin\win_bison.exe") { Copy-Item "$bin\win_bison.exe" "$bin\bison.exe" -Force }

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          modules: qtwebengine
          dir: C:\Qt

      - name: Fix Qt layout
        shell: powershell
        run: |
          if (!(Test-Path "C:\Qt\5.15.2")) {
            Copy-Item -Recurse "C:\Qt\Qt\5.15.2" "C:\Qt\5.15.2"
          }

          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\translations
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\resources

      - name: Setup MSYS2 tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            autoconf
            automake
            libtool
            pkgconf
            meson
            ninja
            bison
            flex
            git
            nasm
            p7zip
            patch
            unzip
            zip
            gperf
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-glew

      - name: Configure OpenRV
        shell: powershell
        run: |
          # 1. Prepend MSYS2 and Tools to front of PATH
          $env:PATH = "C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;C:\Program Files\LLVM\bin;" + $env:PATH
          # 2. Strip Git Bash completely out of the PATH so it can't hijack the build
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Git\\bin' -and $_ -notmatch 'Git\\usr\\bin' -and $_ -notmatch 'Git\\mingw64\\bin' }) -join ';'
          
          $env:QT_HOME = "C:\Qt\5.15.2\msvc2019_64"

          # Restored your original PySide/Python OFF flags here!
          cmake -B build `
            -G "Visual Studio 17 2022" `
            -T v142 `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DCMAKE_POLICY_DEFAULT_CMP0148=OLD `
            -DRV_BUILD_PYSIDE=OFF `
            -DRV_DEPS_PYSIDE2_BUILD=OFF `
            -DRV_DEPS_PYTHON_BUILD=OFF `
            -DRV_BUILD_DOCS=OFF `
            -DCMAKE_PREFIX_PATH=$env:QT_HOME `
            -DRV_DEPS_QT_LOCATION=$env:QT_HOME `
            -DRV_DEPS_WIN_PERL_ROOT="C:\Strawberry\perl\bin"

      - name: Build OpenRV
        shell: powershell
        run: |
          # Re-apply the strict PATH rules for the actual build process
          $env:PATH = "C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;C:\Program Files\LLVM\bin;" + $env:PATH
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Git\\bin' -and $_ -notmatch 'Git\\usr\\bin' -and $_ -notmatch 'Git\\mingw64\\bin' }) -join ';'
          
          cmake --build build --config Release --parallel 4

      - name: Install OpenRV
        shell: powershell
        run: |
          # Re-apply for the install process
          $env:PATH = "C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;C:\Program Files\LLVM\bin;" + $env:PATH
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Git\\bin' -and $_ -notmatch 'Git\\usr\\bin' -and $_ -notmatch 'Git\\mingw64\\bin' }) -join ';'
          
          cmake --install build --config Release --prefix install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-Windows
          path: install
