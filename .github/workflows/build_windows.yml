name: Build OpenRV Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Enable Long Paths for Git
        run: git config --system core.longpaths true

      - name: Checkout OpenRV
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Cache Build
        uses: actions/cache@v4
        with:
          path: build
          key: openrv-Windows-v5-${{ github.sha }}
          restore-keys: |
            openrv-Windows-v5-

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.2
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fix Windows TEMP directory
        run: |
          New-Item -ItemType Directory -Force -Path C:\temp
          echo "TEMP=C:\temp" >> $env:GITHUB_ENV
          echo "TMP=C:\temp" >> $env:GITHUB_ENV

      - name: Install Chocolatey & Pip Dependencies
        run: |
          choco install strawberryperl pkgconfiglite jom llvm ninja -y
          choco install winflexbison -y
          python -m pip install --upgrade pip
          pip install pyyaml requests wheel numpy meson ninja setuptools>=70.1.0 py7zr==1.0.* aqtinstall==3.3.*

      - name: Setup Flex/Bison Aliases
        run: |
          $bin="C:\ProgramData\chocolatey\bin"
          if (Test-Path "$bin\winflex.exe") { Copy-Item "$bin\winflex.exe" "$bin\flex.exe" -Force }
          if (Test-Path "$bin\win_flex.exe") { Copy-Item "$bin\win_flex.exe" "$bin\flex.exe" -Force }
          if (Test-Path "$bin\winbison.exe") { Copy-Item "$bin\winbison.exe" "$bin\bison.exe" -Force }
          if (Test-Path "$bin\win_bison.exe") { Copy-Item "$bin\win_bison.exe" "$bin\bison.exe" -Force }

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: 'win64_msvc2019_64'
          modules: 'qtwebengine'
          dir: 'C:\Qt'
          install-deps: 'true'

      - name: Copy Qt to avoid path length issues
        run: |
          if (!(Test-Path "C:\Qt\5.15.2")) {
            Copy-Item -Recurse "C:\Qt\Qt\5.15.2" "C:\Qt\5.15.2"
          }
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\translations
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\resources

      - name: Install MSYS2 Dependencies
        run: C:\msys64\usr\bin\pacman.exe -Sy --noconfirm base-devel autotools gettext-devel gperf nasm
        shell: cmd

      - name: Apply Windows-Specific Patches
        shell: python
        run: |
          import os
          print("Applying Windows-specific patches to OpenRV...")
          
          # 1. Fix OpenColorIO (OCIO) missing Python.h
          ocio_file = "cmake/dependencies/RV_DEPS_OCIO.cmake"
          if os.path.exists(ocio_file):
              with open(ocio_file, "r") as f:
                  ocio = f.read()
              ocio = ocio.replace(
                  "-DCMAKE_INSTALL_PREFIX",
                  "-DPython_EXECUTABLE:FILEPATH=${Python_EXECUTABLE}\n        -DPython_ROOT_DIR:PATH=${Python_ROOT_DIR}\n        -DCMAKE_INSTALL_PREFIX"
              )
              with open(ocio_file, "w") as f:
                  f.write(ocio)

          # 2. Fix PCRE2 DLL naming for Windows MSVC
          pcre2_file = "cmake/dependencies/RV_DEPS_PCRE2.cmake"
          if os.path.exists(pcre2_file):
              with open(pcre2_file, "r") as f:
                  pcre2 = f.read()
              pcre2 = pcre2.replace("libpcre2-8-0.dll", "pcre2-8.dll")
              pcre2 = pcre2.replace("libpcre2-posix-3.dll", "pcre2-posix.dll")
              with open(pcre2_file, "w") as f:
                  f.write(pcre2)

          # 3. Fix PySide2 Validation crashing on QtWebEngineCore
          make_pyside = "src/build/make_pyside.py"
          if os.path.exists(make_pyside):
              with open(make_pyside, "r") as f:
                  pyside = f.read()
              pyside = pyside.replace(
                  "from PySide2 import QtWebEngineCore, QtWebEngine",
                  "pass # Skipped WebEngine validation (DLL resolution issue on Win/Py3.10)"
              )
              with open(make_pyside, "w") as f:
                  f.write(pyside)
          
          print("Patches applied successfully!")

      - name: Configure CMake
        run: |
          cmake -E make_directory build\stage\app\bin
          cmake -E make_directory build\stage\app\lib
          
          set LLVM_INSTALL_DIR=C:\Program Files\LLVM
          set CLANG_INSTALL_DIR=C:\Program Files\LLVM
          set PATH=%pythonLocation%;%pythonLocation%\Scripts;C:\Program Files\LLVM\bin;C:\Qt\5.15.2\msvc2019_64\bin;C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;%PATH%
          
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -T v142 ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ^
            -DCMAKE_POLICY_DEFAULT_CMP0148=OLD ^
            -DCMAKE_PREFIX_PATH="C:/Qt/5.15.2/msvc2019_64" ^
            -DRV_DEPS_QT_LOCATION="C:/Qt/5.15.2/msvc2019_64" ^
            -DRV_DEPS_WIN_PERL_ROOT="C:/Strawberry/perl/bin" ^
            -DPython3_ROOT_DIR="%pythonLocation%" ^
            -DPython3_EXECUTABLE="%pythonLocation%\python.exe" ^
            -DPython_ROOT_DIR="%pythonLocation%" ^
            -DPython_EXECUTABLE="%pythonLocation%\python.exe" ^
            -DPython_FIND_REGISTRY=NEVER ^
            -DPython3_FIND_REGISTRY=NEVER
        shell: cmd

      - name: Build OpenRV
        run: |
          set LLVM_INSTALL_DIR=C:\Program Files\LLVM
          set CLANG_INSTALL_DIR=C:\Program Files\LLVM
          set PATH=%pythonLocation%;%pythonLocation%\Scripts;C:\Program Files\LLVM\bin;C:\Qt\5.15.2\msvc2019_64\bin;C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;%PATH%
          
          cmake --build build --config Release --parallel 4
        shell: cmd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OpenRV-Windows
          path: build\stage\app
