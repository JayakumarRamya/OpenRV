name: Build OpenRV on Windows

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Qt 5.15
        uses: 'qt/actions/setup-qt@v1'
        with:
          qt-version: '5.15'

      - name: Install dependencies
        run: |
          choco install ffmpeg
          choco install openimageio
          choco install openexr

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 16 2019" -DQt5_DIR="C:\Qt\5.15\msvc2019_64\lib\CMake\Qt5"

      - name: Build the project
        run: |
          cd build
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          ctest
