name: Build OpenRV Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    - name: Checkout OpenRV
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install Python requirements
      run: pip install -r requirements.txt

    - name: Install Chocolatey dependencies
      run: |
        choco install winflexbison -y
        choco install pkgconfiglite -y
        choco install nasm -y
        choco install cmake -y

    - name: Add winflexbison to PATH
      run: |
        echo "C:\ProgramData\chocolatey\lib\winflexbison\tools" >> $env:GITHUB_PATH

    - name: Run rvbootstrap
      shell: bash
      run: |
        python rvbootstrap

    - name: Configure CMake
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64

    - name: Build OpenRV
      run: |
        cmake --build build --config Release --target rv
