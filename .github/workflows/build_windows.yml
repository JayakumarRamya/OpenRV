name: Build OpenRV Windows (VFX-CY2024)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build configuration
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    env:
      BUILD_DIR: C:\rv
      PYTHON_VERSION: "3.11"
      QT_VERSION: "6.5.3"

    steps:
      - name: Enable Windows long paths
        shell: powershell
        run: |
          git config --system core.longpaths true
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -value 1

      - name: Checkout OpenRV
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: temp_src

      - name: Move repository to short path
        shell: powershell
        run: |
          if (Test-Path $env:BUILD_DIR) { Remove-Item -Recurse -Force $env:BUILD_DIR }
          New-Item -ItemType Directory -Path $env:BUILD_DIR
          Move-Item -Path "temp_src\*" -Destination $env:BUILD_DIR
          Remove-Item -Recurse -Force temp_src

      - name: Free disk space
        shell: powershell
        run: |
          $paths = @(
            "C:\Program Files\Android",
            "C:\hostedtoolcache\windows\CodeQL",
            "C:\hostedtoolcache\windows\Java"
          )
          foreach ($path in $paths) {
            if (Test-Path $path) { Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue }
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create python3 alias
        shell: powershell
        run: |
          $py = (Get-Command python).Source
          $dir = Split-Path $py
          if (!(Test-Path "$dir\python3.exe")) { Copy-Item $py "$dir\python3.exe" }
          echo "PYTHON_HOME=$dir" >> $env:GITHUB_ENV

      - name: Install system tools
        shell: powershell
        run: |
          choco install strawberryperl nasm winflexbison pkgconfiglite cmake -y
          rustup toolchain install stable
          python -m pip install --upgrade pip setuptools wheel
          pip install pyyaml requests wheel pyzstd py7zr pre-commit numpy

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          dir: C:\Qt

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            autoconf automake bison flex git libtool nasm p7zip patch unzip zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-glew

      - name: Cache OpenRV dependencies
        uses: actions/cache@v4
        with:
          path: |
            C:\rv\_build\RV_DEPS
            C:\rv\_build\download
          key: ${{ runner.os }}-openrv-${{ env.QT_VERSION }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-openrv-${{ env.QT_VERSION }}-

      - name: Bootstrap and Build
        shell: msys2 {0}
        working-directory: C:\rv
        run: |
          # Define critical VFX Platform variables
          export RV_VFX_PLATFORM=CY2024
          export QT_HOME="C:/Qt/6.5.3/msvc2019_64"
          export PYTHON_HOME=$(cygpath -u "$PYTHON_HOME")
          
          # Force CMake and MSVC into the path for MSYS2
          export PATH="/c/Program Files/CMake/bin:/c/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Tools/MSVC/$(ls /c/Program\ Files/Microsoft\ Visual\ Studio/2022/Enterprise/VC/Tools/MSVC/ | head -n 1)/bin/Hostx64/x64:$PATH"

          source rvcmds.sh

          if [ "${{ github.event.inputs.build_type }}" = "Debug" ]; then
            rvdebug
          else
            rvrelease
          fi

          # Bootstrap downloads and builds internal dependencies
          rvbootstrap
          
          # RVMK starts the actual OpenRV compilation
          rvmk

      - name: Create installation package
        shell: msys2 {0}
        working-directory: C:\rv
        run: |
          source rvcmds.sh
          rvinst

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-Windows-${{ github.event.inputs.build_type }}
          path: C:\rv\_install
