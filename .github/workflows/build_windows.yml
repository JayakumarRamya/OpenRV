name: Build OpenRV Windows (VFX-CY2024)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    env:
      QT_VERSION: 5.15.2
      PYTHON_VERSION: "3.10"

    steps:

      - name: Enable Windows long paths
        run: git config --system core.longpaths true

      - name: Checkout OpenRV
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Key on both root CMakeLists AND cmake/dependencies so dep version
      # bumps correctly invalidate the cache.
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: openrv-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/dependencies/**') }}
          restore-keys: |
            openrv-${{ runner.os }}-

      # v143 is the toolset that ships with windows-2022 (VS 2022).
      # v142 (VS 2019) can work too but requires the optional component
      # to be installed on the runner — risky to rely on.
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Fix Windows TEMP
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\temp
          echo "TEMP=C:\temp" >> $env:GITHUB_ENV
          echo "TMP=C:\temp" >> $env:GITHUB_ENV

      - name: Install build tools
        shell: powershell
        run: |
          # Pin cmake to 3.31.7 — CMake 4 breaks the OpenRV dep builds.
          # 3.27 is too old; some deps now require 3.28+.
          choco install strawberryperl nasm pkgconfiglite jom -y
          choco install winflexbison -y
          choco install cmake --version=3.31.7 --installargs 'ADD_CMAKE_TO_PATH=System' -y

          python -m pip install --upgrade pip
          pip install pyyaml requests wheel numpy
          pip install meson ninja

          echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

      - name: Fix flex and bison
        shell: powershell
        run: |
          $bin = "C:\ProgramData\chocolatey\bin"
          # winflexbison installs as win_flex.exe / win_bison.exe.
          # Fail loudly if the source file isn't there rather than
          # silently producing a missing flex/bison later.
          Copy-Item "$bin\win_flex.exe"  "$bin\flex.exe"  -Force -ErrorAction Stop
          Copy-Item "$bin\win_bison.exe" "$bin\bison.exe" -Force -ErrorAction Stop

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          modules: qtwebengine
          dir: C:\Qt

      - name: Fix Qt layout
        shell: powershell
        run: |
          # jurplel/install-qt-action nests under Qt\ on some versions.
          # Only copy if the expected path is missing; fail if neither exists.
          if (!(Test-Path "C:\Qt\5.15.2")) {
            if (!(Test-Path "C:\Qt\Qt\5.15.2")) {
              throw "Qt not found in either C:\Qt\5.15.2 or C:\Qt\Qt\5.15.2"
            }
            Copy-Item -Recurse "C:\Qt\Qt\5.15.2" "C:\Qt\5.15.2"
          }
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\translations
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\resources

      - name: Setup MSYS2 tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            autoconf
            automake
            libtool
            pkgconf
            meson
            ninja
            bison
            flex
            git
            nasm
            p7zip
            patch
            unzip
            zip
            gperf
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-glew

      - name: Inject MSYS2 into Global PATH
        shell: powershell
        run: |
          echo "C:\msys64\usr\bin"    >> $env:GITHUB_PATH
          echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Configure OpenRV
        shell: bash
        run: |
          set -e
          export QT_HOME="C:/Qt/5.15.2/msvc2019_64"

          cmake -B build \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_HOME" \
            -DRV_DEPS_QT_LOCATION="$QT_HOME" \
            -DRV_DEPS_WIN_PERL_ROOT="C:/Strawberry/perl/bin"

      - name: Build OpenRV
        shell: bash
        run: |
          set -e
          # Use all available cores rather than a hardcoded 4.
          cmake --build build --config Release --parallel $(nproc)

      - name: Install OpenRV
        shell: bash
        run: |
          set -e
          cmake --install build --config Release --prefix install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-Windows
          path: install
