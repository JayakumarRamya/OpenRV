name: Build OpenRV Windows (VFX-CY2024)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    env:
      QT_VERSION: 5.15.2
      PYTHON_VERSION: "3.10"
      # Declare the expanded PATH once so both Configure and Build share it
      RV_BUILD_PATH: "C:/msys64/usr/bin;C:/msys64/mingw64/bin;C:/ProgramData/chocolatey/bin;C:/Strawberry/perl/bin"

    steps:

      - name: Enable Windows long paths
        run: git config --system core.longpaths true

      - name: Checkout OpenRV
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: openrv-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Fix Windows TEMP
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\temp
          echo "TEMP=C:\temp" >> $env:GITHUB_ENV
          echo "TMP=C:\temp" >> $env:GITHUB_ENV

      - name: Install build tools
        shell: powershell
        run: |
          choco install strawberryperl nasm pkgconfiglite jom -y
          choco install winflexbison -y
          choco install cmake --version=3.27.9 -y

          python -m pip install --upgrade pip
          pip install pyyaml requests wheel numpy
          pip install meson ninja

      - name: Fix flex and bison
        shell: powershell
        run: |
          $bin="C:\ProgramData\chocolatey\bin"
          if (Test-Path "$bin\winflex.exe")  { Copy-Item "$bin\winflex.exe"  "$bin\flex.exe"  -Force }
          if (Test-Path "$bin\win_flex.exe") { Copy-Item "$bin\win_flex.exe" "$bin\flex.exe"  -Force }
          if (Test-Path "$bin\winbison.exe") { Copy-Item "$bin\winbison.exe" "$bin\bison.exe" -Force }
          if (Test-Path "$bin\win_bison.exe"){ Copy-Item "$bin\win_bison.exe""$bin\bison.exe" -Force }

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          modules: qtwebengine
          dir: C:\Qt

      - name: Fix Qt layout
        shell: powershell
        run: |
          if (!(Test-Path "C:\Qt\5.15.2")) {
            Copy-Item -Recurse "C:\Qt\Qt\5.15.2" "C:\Qt\5.15.2"
          }
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\translations
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\resources

      - name: Setup MSYS2 tools
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            autoconf
            automake
            libtool
            pkgconf
            meson
            ninja
            bison
            flex
            git
            nasm
            p7zip
            patch
            unzip
            zip
            gperf
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-glew

      - name: Inject Global Paths
        shell: powershell
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\msys64\usr\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\msys64\mingw64\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\ProgramData\chocolatey\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Strawberry\perl\bin"

      - name: Verify tools are reachable
        shell: bash
        run: |
          echo "--- PATH ---"
          echo "$PATH"
          echo "--- nasm ---"
          nasm --version || echo "nasm NOT FOUND"
          echo "--- autoconf ---"
          autoconf --version || echo "autoconf NOT FOUND"
          echo "--- libtoolize ---"
          libtoolize --version || echo "libtoolize NOT FOUND"

      - name: Configure OpenRV
        shell: bash
        # Force MSBuild child processes to also see these dirs via PATH
        env:
          PATH: "/c/msys64/usr/bin:/c/msys64/mingw64/bin:/c/ProgramData/chocolatey/bin:/c/Strawberry/perl/bin:$PATH"
        run: |
          set -e

          export QT_HOME="C:/Qt/5.15.2/msvc2019_64"

          cmake -B build \
            -G "Visual Studio 17 2022" \
            -T v142 \
            -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_POLICY_DEFAULT_CMP0148=OLD \
            -DRV_BUILD_PYSIDE=OFF \
            -DRV_DEPS_PYSIDE2_BUILD=OFF \
            -DRV_DEPS_PYSIDE2_DISABLE=ON \
            -DRV_DEPS_PYTHON_BUILD=OFF \
            -DRV_BUILD_DOCS=OFF \
            -DCMAKE_PREFIX_PATH="$QT_HOME" \
            -DRV_DEPS_QT_LOCATION="$QT_HOME" \
            -DRV_DEPS_WIN_PERL_ROOT="C:/Strawberry/perl/bin" \
            -DCMAKE_PROGRAM_PATH="C:/msys64/usr/bin;C:/msys64/mingw64/bin;C:/ProgramData/chocolatey/bin"

      - name: Build OpenRV
        shell: bash
        env:
          PATH: "/c/msys64/usr/bin:/c/msys64/mingw64/bin:/c/ProgramData/chocolatey/bin:/c/Strawberry/perl/bin:$PATH"
        run: |
          set -e
          cmake --build build --config Release --parallel 4

      - name: Install OpenRV
        shell: bash
        run: |
          set -e
          cmake --install build --config Release --prefix install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-Windows
          path: install
