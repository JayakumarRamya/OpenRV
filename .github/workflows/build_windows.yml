name: OpenRV Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    - name: Checkout source
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Install Strawberry Perl
      run: choco install strawberryperl -y

    - name: Install Rust
      shell: powershell
      run: |
        Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
        .\rustup-init.exe -y
        echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          git
          flex
          bison
          nasm
          unzip
          zip
          patch
          autoconf
          automake
          libtool
          make
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-autotools
          mingw-w64-x86_64-libarchive
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-pkg-config

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.5.3"
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        dir: C:/Qt

    - name: Build OpenRV
      shell: msys2 {0}
      run: |
        bash -l <<'EOF'

        export RV_VFX_PLATFORM=CY2024
        export RV_BUILD_PARALLELISM=8
        export QT_HOME=/c/Qt/6.5.3/msvc2019_64

        cd "$GITHUB_WORKSPACE"

        git submodule update --init --recursive

        # enable alias commands defined in rvcmds.sh
        shopt -s expand_aliases

        # load OpenRV build commands
        source rvcmds.sh

        # first build (downloads dependencies and builds)
        rvbootstrap

        # configure ffmpeg codecs
        rvcfg \
          -DRV_FFMPEG_NON_FREE_DECODERS_TO_ENABLE="aac;h264;hevc;prores" \
          -DRV_FFMPEG_NON_FREE_ENCODERS_TO_ENABLE="aac"

        # build OpenRV
        rvmk

        EOF

    - name: Upload OpenRV Build
      uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: _build/stage/app
