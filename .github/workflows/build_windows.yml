name: Build OpenRV Windows (VFX-CY2024)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build configuration
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    env:
      BUILD_DIR: C:\rv
      PYTHON_VERSION: "3.11"
      QT_VERSION: "6.5.3"

    steps:

      - name: Enable Windows long paths
        run: git config --system core.longpaths true

      - name: Checkout OpenRV
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: temp_src

      - name: Move repository to short path
        shell: powershell
        run: |
          mkdir $env:BUILD_DIR
          Move-Item -Path "temp_src\*" -Destination $env:BUILD_DIR
          Remove-Item -Recurse -Force temp_src

      - name: Free disk space
        shell: powershell
        run: |
          Write-Host "Cleaning runner disk..."
          Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\CodeQL" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\Java" -ErrorAction SilentlyContinue

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create python3 alias
        shell: powershell
        run: |
          $py = (Get-Command python).Source
          $dir = Split-Path $py
          if (!(Test-Path "$dir\python3.exe")) {
            Copy-Item $py "$dir\python3.exe"
          }

      - name: Install system tools
        shell: powershell
        run: |
          choco install strawberryperl nasm winflexbison pkgconfiglite cmake ccache -y
          rustup toolchain install stable
          python -m pip install --upgrade pip setuptools wheel
          pip install pyyaml requests wheel pyzstd py7zr pre-commit numpy

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          dir: C:\Qt

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            autoconf automake bison flex git libtool nasm p7zip patch unzip zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-glew

      - name: Cache OpenRV dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}\_build\RV_DEPS
            ${{ env.BUILD_DIR }}\_build\download
          key: ${{ runner.os }}-openrv-${{ env.PYTHON_VERSION }}-${{ env.QT_VERSION }}-${{ hashFiles('cmake/defaults/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-openrv-${{ env.PYTHON_VERSION }}-

      - name: Bootstrap and Build
        shell: bash
        working-directory: /c/rv
        run: |
          export PATH="$PATH:/c/Program Files/CMake/bin:/c/msys64/mingw64/bin"
          export ACLOCAL_PATH="/c/msys64/usr/share/aclocal"
          export QT_HOME="/c/Qt/${{ env.QT_VERSION }}/msvc2019_64"
          export RV_VFX_PLATFORM=CY2024
          export MAKEFLAGS="-j$(nproc)"

          source ./rvcmds.sh

          if [ "${{ github.event.inputs.build_type }}" == "Debug" ]; then
            rvdebug
          else
            rvrelease
          fi

          rvbootstrap
          rvmk

      - name: Create installation package
        shell: bash
        working-directory: /c/rv
        run: |
          source ./rvcmds.sh
          rvinst

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-Windows-${{ github.event.inputs.build_type }}
          path: C:\rv\_install
