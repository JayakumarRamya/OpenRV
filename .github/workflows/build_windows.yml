name: Build OpenRV Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    - name: Checkout OpenRV
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python requirements
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml requests wheel pyzstd py7zr pre-commit numpy

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >
          autoconf
          automake
          bison
          flex
          git
          libtool
          nasm
          p7zip
          patch
          unzip
          zip
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-autotools
          mingw-w64-x86_64-libarchive
          mingw-w64-x86_64-glew

    - name: Install Strawberry Perl
      run: choco install strawberryperl -y

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Bootstrap OpenRV
      shell: bash
      run: |
        source rvcmds.sh
        rvbootstrap

    - name: Build OpenRV
      shell: bash
      run: |
        source rvcmds.sh
        rvmk

    - name: Upload RV Build
      uses: actions/upload-artifact@v4
      with:
        name: openrv-windows
        path: _build/stage/app
