name: Build OpenRV Windows (VFX-CY2024)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 480

    env:
      QT_VERSION: 5.15.2
      PYTHON_VERSION: "3.10"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Enable Windows long paths
        run: git config --system core.longpaths true

      - name: Checkout OpenRV
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: openrv-${{ runner.os }}-v8-${{ hashFiles('CMakeLists.txt') }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Fix Windows TEMP
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\temp
          echo "TEMP=C:\temp" >> $env:GITHUB_ENV
          echo "TMP=C:\temp" >> $env:GITHUB_ENV

      - name: Install build tools
        shell: powershell
        run: |
          choco install strawberryperl pkgconfiglite jom llvm ninja -y
          choco install winflexbison -y
          choco install cmake --version=3.27.9 -y
          python -m pip install --upgrade pip
          pip install pyyaml requests wheel numpy meson ninja

      - name: Fix flex and bison
        shell: powershell
        run: |
          $bin="C:\ProgramData\chocolatey\bin"
          if (Test-Path "$bin\winflex.exe")   { Copy-Item "$bin\winflex.exe"   "$bin\flex.exe"  -Force }
          if (Test-Path "$bin\win_flex.exe")   { Copy-Item "$bin\win_flex.exe"  "$bin\flex.exe"  -Force }
          if (Test-Path "$bin\winbison.exe")   { Copy-Item "$bin\winbison.exe"  "$bin\bison.exe" -Force }
          if (Test-Path "$bin\win_bison.exe")  { Copy-Item "$bin\win_bison.exe" "$bin\bison.exe" -Force }

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          modules: qtwebengine
          dir: C:\Qt
          setup-python: 'false'

      - name: Fix Qt layout
        shell: powershell
        run: |
          if (!(Test-Path "C:\Qt\5.15.2")) {
            Copy-Item -Recurse "C:\Qt\Qt\5.15.2" "C:\Qt\5.15.2"
          }
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\translations
          New-Item -ItemType Directory -Force -Path C:\Qt\5.15.2\msvc2019_64\resources

      - name: Setup Native MSYS2 Tools
        shell: cmd
        run: |
          C:\msys64\usr\bin\pacman.exe -Sy --noconfirm base-devel autotools gettext-devel gperf nasm

      - name: Diagnose PCRE2 cmake configuration
        shell: powershell
        run: |
          Write-Host "=== Finding all PCRE2-related cmake files ==="
          Get-ChildItem -Path "cmake" -Recurse -Include "*.cmake","CMakeLists.txt" -ErrorAction SilentlyContinue | ForEach-Object {
            $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -and $content -match '(?i)pcre2') {
              Write-Host "`n============================================"
              Write-Host "FILE: $($_.FullName)"
              Write-Host "============================================"
              Get-Content $_.FullName
            }
          }

      - name: Patch PCRE2 to build shared libraries
        shell: powershell
        run: |
          Write-Host "=== Patching PCRE2 cmake to enable shared library build ==="
          $patched = $false
          Get-ChildItem -Path "cmake" -Recurse -Include "*.cmake","CMakeLists.txt" -ErrorAction SilentlyContinue | ForEach-Object {
            $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -and $content -match '(?i)pcre2') {
              $original = $content

              # Fix 1: Change --disable-shared to --enable-shared (autotools)
              if ($content -match '--disable-shared') {
                $content = $content -replace '--disable-shared', '--enable-shared'
                Write-Host "Replaced --disable-shared with --enable-shared in $($_.FullName)"
              }

              # Fix 2: If --enable-shared is still missing but configure is present, add it
              if ($content -match 'configure' -and $content -notmatch '--enable-shared') {
                $content = $content -replace '(--enable-static)', '--enable-shared --enable-static'
                Write-Host "Added --enable-shared alongside --enable-static in $($_.FullName)"
              }

              # Fix 3: If using CMake-based PCRE2 build, ensure BUILD_SHARED_LIBS=ON
              if ($content -match 'CMAKE_ARGS' -and $content -match '(?i)pcre2') {
                if ($content -match 'BUILD_SHARED_LIBS\s*(=|:)\s*(OFF|FALSE|0)') {
                  $content = $content -replace '(BUILD_SHARED_LIBS\s*(=|:)\s*)(OFF|FALSE|0)', '${1}ON'
                  Write-Host "Changed BUILD_SHARED_LIBS to ON in $($_.FullName)"
                }
                if ($content -notmatch 'BUILD_SHARED_LIBS') {
                  $content = $content -replace '(CMAKE_ARGS)', '${1} -DBUILD_SHARED_LIBS=ON'
                  Write-Host "Added BUILD_SHARED_LIBS=ON in $($_.FullName)"
                }
              }

              if ($content -ne $original) {
                Set-Content $_.FullName $content -NoNewline
                $patched = $true
                Write-Host "`n--- Patched file content ---"
                Get-Content $_.FullName
              }
            }
          }
          if (-not $patched) {
            Write-Host "WARNING: Could not find PCRE2 configure flags to patch!"
            Write-Host "Falling back to post-build DLL creation strategy..."
          }

      - name: Patch OCIO to disable Python bindings
        shell: powershell
        run: |
          Get-ChildItem -Path "cmake" -Recurse -Include "*.cmake","CMakeLists.txt" -ErrorAction SilentlyContinue | ForEach-Object {
            $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -and $content -match '(?i)RV_DEPS_OCIO') {
              Write-Host "Found OCIO config: $($_.FullName)"

              $original = $content

              # Force Python bindings OFF
              $content = $content -replace '(-DOCIO_BUILD_PYTHON_BINDINGS=)\w+', '${1}OFF'

              # If flag doesn't exist, add it to CMAKE_ARGS
              if ($content -notmatch 'OCIO_BUILD_PYTHON_BINDINGS') {
                $content = $content -replace '(CMAKE_ARGS)', '${1} -DOCIO_BUILD_PYTHON_BINDINGS=OFF'
              }

              if ($content -ne $original) {
                Set-Content $_.FullName $content -NoNewline
                Write-Host "Patched OCIO Python bindings OFF"
              }
            }
          }

      - name: Patch PySide2 validation to be non-fatal
        shell: powershell
        run: |
          $found = $false
          Get-ChildItem -Recurse -Filter "make_pyside.py" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Found: $($_.FullName)"
            $content = Get-Content $_.FullName -Raw
            if ($content -match 'check_returncode') {
              $content = $content -replace '\.check_returncode\(\)', '  # check_returncode disabled for CI'
              Set-Content $_.FullName $content -NoNewline
              Write-Host "Patched: removed check_returncode()"
              $found = $true
            }
          }
          if (-not $found) {
            Write-Host "make_pyside.py not found or no check_returncode to patch"
          }

      - name: Verify all patches
        shell: powershell
        run: |
          Write-Host "=== Python environment ==="
          Write-Host "pythonLocation: $env:pythonLocation"
          Write-Host "Python.h exists: $(Test-Path "$env:pythonLocation\include\Python.h")"
          if (Test-Path "$env:pythonLocation\libs") {
            Get-ChildItem "$env:pythonLocation\libs" -Filter "python*" | ForEach-Object { Write-Host "  $($_.Name)" }
          }

          Write-Host "`n=== Qt environment ==="
          Write-Host "Qt exists: $(Test-Path 'C:\Qt\5.15.2\msvc2019_64\bin\qmake.exe')"

          Write-Host "`n=== PCRE2 cmake after patch ==="
          Get-ChildItem -Path "cmake" -Recurse -Include "*.cmake","CMakeLists.txt" -ErrorAction SilentlyContinue | ForEach-Object {
            $c = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
            if ($c -and $c -match '(?i)pcre2') {
              Write-Host "`nFILE: $($_.FullName)"
              ($c -split "`n") | Where-Object { $_ -match '(?i)(pcre2|shared|disable|enable)' } | ForEach-Object { Write-Host "  $_" }
            }
          }

          Write-Host "`n=== OCIO cmake after patch ==="
          Get-ChildItem -Path "cmake" -Recurse -Include "*.cmake","CMakeLists.txt" -ErrorAction SilentlyContinue | ForEach-Object {
            $c = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
            if ($c -and $c -match '(?i)OCIO.*python|python.*OCIO') {
              Write-Host "FILE: $($_.FullName)"
              ($c -split "`n") | Where-Object { $_ -match '(?i)python' } | ForEach-Object { Write-Host "  $_" }
            }
          }

      - name: Configure OpenRV
        shell: cmd
        run: |
          set PATH=%pythonLocation%;%pythonLocation%\Scripts;C:\Program Files\LLVM\bin;C:\Qt\5.15.2\msvc2019_64\bin;C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;%PATH%
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -T v142 ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ^
            -DCMAKE_POLICY_DEFAULT_CMP0148=OLD ^
            -DRV_BUILD_PYSIDE=OFF ^
            -DRV_DEPS_PYSIDE2_BUILD=OFF ^
            -DRV_DEPS_PYTHON_BUILD=OFF ^
            -DRV_BUILD_DOCS=OFF ^
            -DCMAKE_PREFIX_PATH="C:/Qt/5.15.2/msvc2019_64" ^
            -DRV_DEPS_QT_LOCATION="C:/Qt/5.15.2/msvc2019_64" ^
            -DRV_DEPS_WIN_PERL_ROOT="C:/Strawberry/perl/bin" ^
            -DPython3_ROOT_DIR="%pythonLocation%" ^
            -DPython3_EXECUTABLE="%pythonLocation%\python.exe" ^
            -DPython3_INCLUDE_DIR="%pythonLocation%\include" ^
            -DPython3_LIBRARY="%pythonLocation%\libs\python310.lib" ^
            -DPython_ROOT_DIR="%pythonLocation%" ^
            -DPython_EXECUTABLE="%pythonLocation%\python.exe" ^
            -DPython_INCLUDE_DIR="%pythonLocation%\include" ^
            -DPython_LIBRARY="%pythonLocation%\libs\python310.lib" ^
            -DPython_FIND_REGISTRY=NEVER ^
            -DPython3_FIND_REGISTRY=NEVER ^
            -DOCIO_BUILD_PYTHON_BINDINGS=OFF ^
            -DOCIO_BUILD_APPS=OFF

      - name: PCRE2 fallback - create DLLs if missing after configure
        shell: powershell
        run: |
          # After configure, the ExternalProject dirs are set up
          # We'll create a scheduled task-like approach: monitor and fix
          # Create a helper script that will be called during build
          $script = @'
          $pcre2Install = "D:\a\OpenRV\OpenRV\build\RV_DEPS_PCRE2\install"
          $pcre2Src = "D:\a\OpenRV\OpenRV\build\RV_DEPS_PCRE2\src"
          $stageDir = "D:\a\OpenRV\OpenRV\build\stage\app\bin"

          # Ensure directories exist
          New-Item -ItemType Directory -Force -Path "$pcre2Install\bin" | Out-Null
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          # Check if DLLs exist
          $dll1 = "$pcre2Install\bin\libpcre2-8-0.dll"
          $dll2 = "$pcre2Install\bin\libpcre2-posix-3.dll"

          if (!(Test-Path $dll1) -or !(Test-Path $dll2)) {
              Write-Host "PCRE2 DLLs missing - rebuilding with shared libraries..."

              # Try to rebuild PCRE2 with shared libs using MSYS2
              $env:PATH = "C:\msys64\usr\bin;C:\msys64\mingw64\bin;$env:PATH"
              $env:MSYSTEM = "MSYS"

              if (Test-Path $pcre2Src) {
                  Push-Location $pcre2Src
                  # Reconfigure with shared enabled
                  & C:\msys64\usr\bin\bash.exe -lc "cd '$($pcre2Src -replace '\\','/')' && ./configure --prefix='$($pcre2Install -replace '\\','/')' --enable-shared --enable-static --enable-pcre2-8 --enable-pcre2-16 --enable-pcre2-32 && make clean && make -j4 && make install"
                  Pop-Location
              }
          }

          # Verify
          if (Test-Path $dll1) { Write-Host "OK: $dll1" } else { Write-Host "MISSING: $dll1" }
          if (Test-Path $dll2) { Write-Host "OK: $dll2" } else { Write-Host "MISSING: $dll2" }
          '@
          Set-Content "fix_pcre2.ps1" $script
          Write-Host "Created fix_pcre2.ps1 fallback script"

      - name: Build OpenRV
        shell: cmd
        run: |
          cmake -E make_directory build\stage\app\bin
          cmake -E make_directory build\stage\app\lib
          set LLVM_INSTALL_DIR=C:\Program Files\LLVM
          set CLANG_INSTALL_DIR=C:\Program Files\LLVM
          set PATH=%pythonLocation%;%pythonLocation%\Scripts;C:\Program Files\LLVM\bin;C:\Qt\5.15.2\msvc2019_64\bin;C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;%PATH%
          cmake --build build --config Release --parallel 4
          if %errorlevel% neq 0 (
            echo === PCRE2 build may have failed, running fallback ===
            powershell -ExecutionPolicy Bypass -File fix_pcre2.ps1
            echo === Retrying build ===
            cmake --build build --config Release --parallel 4
          )

      - name: Install OpenRV
        shell: cmd
        run: |
          set PATH=%pythonLocation%;%pythonLocation%\Scripts;C:\Program Files\LLVM\bin;C:\Qt\5.15.2\msvc2019_64\bin;C:\msys64\usr\bin;C:\msys64\mingw64\bin;C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;%PATH%
          cmake --install build --config Release --prefix install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-Windows
          path: install
