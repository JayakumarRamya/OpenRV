name: Build OpenRV (Windows)

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Windows (VS 2022 + MSYS2)
    runs-on: windows-2022

    defaults:
      run:
        # All steps run inside an MSYS2 MINGW64 shell so that Unix-style
        # utilities (grep, flex, bison, nasm, …) are on PATH.  The actual
        # compiler is still MSVC – MSYS2 is NOT used as the toolchain.
        shell: msys2 {0}

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. MSYS2 (utilities only, NOT the compiler) ───────────────────────
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            autoconf
            automake
            bison
            flex
            git
            libtool
            nasm
            p7zip
            patch
            unzip
            zip
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-psutil

      # ── 3. Strawberry Perl (required for OpenSSL build step) ─────────────
      - name: Install Strawberry Perl
        shell: pwsh
        run: |
          choco install strawberryperl --yes --no-progress
          echo "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH `
            -Encoding utf8 -Append

      # ── 4. CMake 3.31.7  (CMake 4 breaks the build) ──────────────────────
      #    Installs the native Windows cmake used by the VS generator.
      - name: Install CMake 3.31.7 (native Windows)
        shell: pwsh
        run: |
          $url = "https://github.com/Kitware/CMake/releases/download/v3.31.7/cmake-3.31.7-windows-x86_64.msi"
          Invoke-WebRequest $url -OutFile cmake-installer.msi
          Start-Process msiexec -ArgumentList "/i cmake-installer.msi /quiet /norestart ADD_CMAKE_TO_PATH=System" -Wait
          cmake --version

      # ── 5. Qt 6.5.3 via aqtinstall ───────────────────────────────────────
      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: C:\Qt
          key: qt-6.5.3-windows-msvc2019_64

      - name: Install Qt 6.5.3
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 \
            -m qtwebengine qtwebsockets qtmultimedia qtmultimediawidgets \
            --outputdir /c/Qt

      # ── 6. ccache ────────────────────────────────────────────────────────
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\.ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: |
            ccache-windows-

      # ── 7. Cache third-party dependency builds ───────────────────────────
      #    Boost, OpenEXR, OCIO, Python, PySide2 etc. only rebuild when a
      #    version in cmake/dependencies/ changes.
      - name: Cache OpenRV third-party dependencies
        uses: actions/cache@v4
        with:
          path: _build\_deps
          key: openrv-deps-windows-${{ hashFiles('cmake/dependencies/**') }}
          restore-keys: |
            openrv-deps-windows-

      # ── 8. Configure ─────────────────────────────────────────────────────
      - name: Configure (cmake)
        run: |
          cmake -B _build \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DRV_DEPS_WIN_PERL_ROOT=/c/Strawberry/perl/bin \
            -DRV_DEPS_QT6_LOCATION=/c/Qt/6.5.3/msvc2019_64
        env:
          PATH: /c/Program Files/CMake/bin:$PATH

      # ── 9. Build ─────────────────────────────────────────────────────────
      - name: Build
        run: |
          cmake --build _build \
            --config Release \
            --target main_executable \
            --parallel

      # ── 10. Install ──────────────────────────────────────────────────────
      - name: Install to _install/
        run: |
          cmake --install _build --config Release

      # ── 11. Upload artifact ──────────────────────────────────────────────
      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openrv-windows-${{ github.sha }}
          path: _install\
          retention-days: 14

