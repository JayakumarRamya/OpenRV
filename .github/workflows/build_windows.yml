name: OpenRV Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    env:
      QT_HOME: C:/Qt/6.5.3/msvc2019_64
      Qt6_DIR: C:/Qt/6.5.3/msvc2019_64/lib/cmake/Qt6
      CMAKE_PREFIX_PATH: C:/Qt/6.5.3/msvc2019_64

    steps:

    - name: Checkout source
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Install Strawberry Perl
      run: choco install strawberryperl -y

    - name: Install Rust
      shell: powershell
      run: |
        Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
        .\rustup-init.exe -y
        echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          git
          flex
          bison
          nasm
          unzip
          zip
          patch
          autoconf
          automake
          libtool
          make
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-autotools
          mingw-w64-x86_64-libarchive
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-pkg-config

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.5.3"
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        dir: C:/Qt

    - name: Patch OpenRV toolchain
      shell: msys2 {0}
      run: |
        cd "$GITHUB_WORKSPACE"
        echo "Removing forced MSVC 14.40 requirement"
        sed -i 's/version=14.40//g' rvcmds.sh

    - name: Build OpenRV
      shell: msys2 {0}
      run: |

        bash -il <<'EOF'

        export RV_VFX_PLATFORM=CY2024
        export RV_BUILD_PARALLELISM=8

        export QT_HOME=/c/Qt/6.5.3/msvc2019_64
        export Qt6_DIR=/c/Qt/6.5.3/msvc2019_64/lib/cmake/Qt6
        export CMAKE_PREFIX_PATH=/c/Qt/6.5.3/msvc2019_64

        export PATH="/c/Program Files/CMake/bin:/c/msys64/mingw64/bin:/c/Users/runneradmin/.cargo/bin:$PATH:/c/Strawberry/perl/bin"

        cd "$GITHUB_WORKSPACE"

        git submodule update --init --recursive

        python3 -m pip install --upgrade pip

        source rvcmds.sh

        rvclean || true

        echo "Running bootstrap build"
        rvbootstrap

        echo "Enable extra FFmpeg codecs"
        rvcfg \
          -DQt6_DIR=$Qt6_DIR \
          -DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH \
          -DRV_FFMPEG_NON_FREE_DECODERS_TO_ENABLE="aac;h264;hevc;prores" \
          -DRV_FFMPEG_NON_FREE_ENCODERS_TO_ENABLE="aac"

        rvmk

        EOF

    - name: Upload OpenRV
      uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: _build/stage/app
