name: OpenRV Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    - name: Checkout OpenRV
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Upgrade pip
      run: |
        python -m ensurepip
        python -m pip install --upgrade pip

    - name: Install Python packages
      run: |
        pip install pre-commit

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Install Strawberry Perl
      run: choco install strawberryperl -y

    - name: Install NASM
      run: choco install nasm -y

    - name: Install Flex and Bison
      run: choco install winflexbison3 -y

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.5.3"
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        modules: qtwebengine qtwebsockets qtmultimedia qtwebchannel qtpositioning

    - name: Show Qt location
      shell: powershell
      run: |
        Write-Host "Qt installed at:"
        Write-Host $env:QT_ROOT_DIR

    - name: Configure OpenRV
      shell: powershell
      run: |
        cmake -B build `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DRV_VFX_PLATFORM=CY2024 `
          -DRV_DEPS_QT_LOCATION="$env:QT_ROOT_DIR" `
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
          -DRV_DEPS_WIN_PERL_ROOT="C:/Strawberry/perl/bin" `
          -DFLEX_EXECUTABLE="C:/ProgramData/chocolatey/bin/win_flex.exe" `
          -DRV_FFMPEG_NON_FREE_DECODERS_TO_ENABLE="aac;h264;hevc;prores" `
          -DRV_FFMPEG_NON_FREE_ENCODERS_TO_ENABLE="aac"

    - name: Build OpenRV
      shell: powershell
      run: |
        cmake --build build --config Release --parallel 8

    - name: Install OpenRV
      shell: powershell
      run: |
        cmake --install build --prefix install --config Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: install
