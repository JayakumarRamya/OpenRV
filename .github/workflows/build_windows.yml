name: OpenRV Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    - name: Checkout OpenRV
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.5.3"
        host: windows
        target: desktop
        arch: win64_msvc2019_64

    - name: Configure OpenRV
      run: |
        echo Qt installed at %QT_ROOT_DIR%

        cmake -B build ^
          -G "Visual Studio 17 2022" ^
          -A x64 ^
          -DRV_VFX_PLATFORM=CY2024 ^
          -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%" ^
          -DRV_FFMPEG_NON_FREE_DECODERS_TO_ENABLE="aac;h264;hevc;prores" ^
          -DRV_FFMPEG_NON_FREE_ENCODERS_TO_ENABLE="aac"

    - name: Build OpenRV
      run: |
        cmake --build build --config Release --parallel 8

    - name: Upload OpenRV build
      uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: build/stage/app
