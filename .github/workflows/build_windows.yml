name: OpenRV Windows Fast Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - uses: lukka/get-cmake@latest

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: "6.5.3"
        host: windows
        target: desktop
        arch: win64_msvc2019_64
        modules: qtwebengine qtwebsockets qtmultimedia qtdeclarative

    - name: Configure OpenRV
      shell: powershell
      run: |
        cmake -B build `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DRV_VFX_PLATFORM=CY2024 `
          -DRV_DEPS_QT_LOCATION="$env:QT_ROOT_DIR" `
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
          -DRV_FFMPEG_NON_FREE_DECODERS_TO_ENABLE="aac;h264;hevc;prores" `
          -DRV_FFMPEG_NON_FREE_ENCODERS_TO_ENABLE="aac"

    - name: Build
      shell: powershell
      run: |
        cmake --build build --config Release --parallel 8

    - name: Install
      shell: powershell
      run: |
        cmake --install build --prefix install --config Release

    - uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows
        path: install
